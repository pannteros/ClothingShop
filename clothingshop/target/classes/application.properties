# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/clothingshop?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# App Settings
server.port=8080
spring.application.name=clothingshop

# File upload (για εικόνες)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
